name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build web --release

      - name: Zip web build
        run: |
          cd build/web
          zip -r ../../dichvn-web.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dichvn-web.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Android project
        run: |
          rm -rf android/
          flutter create --platforms=android --org=com.example .
          # Add RECORD_AUDIO and INTERNET permissions
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n\n    <application|' android/app/src/main/AndroidManifest.xml

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Find and copy APK
        run: |
          echo "Looking for APK files..."
          find build/ -name "*.apk" -type f 2>/dev/null || true
          APK_PATH=$(find build/ -name "app-release.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "app-release.apk not found, looking for any release apk..."
            APK_PATH=$(find build/ -name "*release*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            find build/ -type f | head -50
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" ./dichvn-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: dichvn-android.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Windows platform files
        run: flutter create --platforms=windows .

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dichvn-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dichvn-windows.zip

  create-release:
    needs: [build-web, build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: android-build
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Automated release from CI build #${{ github.run_number }}

            ## Downloads
            - **Web**: dichvn-web.zip
            - **Android**: dichvn-android.apk
            - **Windows**: dichvn-windows.zip
          files: |
            release-artifacts/dichvn-web.zip
            release-artifacts/dichvn-android.apk
            release-artifacts/dichvn-windows.zip
          draft: false
          prerelease: false
